<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Singularity Engine | Neura Studio</title>
    <style>
        :root { --bg: #FAFAFC; --text: #1D1D1F; --primary: #0066CC; --card: #FFFFFF; --border: #E5E5EA; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        /* 1. The Blast Preloader Animation */
        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000000; z-index: 9999; display: flex; justify-content: center; align-items: center; animation: hidePreloader 0.5s ease-in 2s forwards; }
        .spin-logo { width: 150px; height: 150px; background: url('8179.png') center/cover; border-radius: 50%; box-shadow: 0 0 30px rgba(0, 162, 255, 0.8); animation: spin 1.5s linear, blastFade 0.5s ease-in 1.5s forwards; }
        
        @keyframes spin { 0% { transform: rotate(0deg) scale(0.8); } 100% { transform: rotate(360deg) scale(1); } }
        @keyframes blastFade { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(50); opacity: 0; display: none; } }
        @keyframes hidePreloader { to { opacity: 0; visibility: hidden; z-index: -1; } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        /* 2. Main UI */
        .content { animation: fadeUp 1s ease-out 2.1s both; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .logo-box { display: flex; align-items: center; gap: 15px; font-size: 24px; font-weight: 800; }
        .nav-logo { width: 45px; height: 45px; background: url('8179.png') center/cover; border-radius: 50%; }
        
        .hero { text-align: center; padding: 100px 20px; }
        .lang-logo { width: 220px; height: 220px; background: url('8180.png') center/cover; border-radius: 20px; margin: 0 auto 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); transition: 0.5s; }
        .lang-logo:hover { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(0, 102, 204, 0.3); }
        .hero h1 { font-size: 5rem; letter-spacing: -2px; margin-bottom: 10px; }
        .hero p { font-size: 1.5rem; color: #5E5E73; max-width: 800px; margin: 0 auto; }
        
        /* Modern Nova Shell */
        .terminal { background: #1D1D1F; border-radius: 16px; max-width: 900px; margin: 60px auto; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.2); }
        .term-header { background: #2D2D2F; padding: 15px; display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #FF5F56; }
        .term-body { padding: 30px; font-family: monospace; color: #00FF88; font-size: 16px; height: 300px; overflow-y: auto; }
        .term-input { display: flex; padding: 20px; background: #000; border-top: 1px solid #333; }
        .term-input input { background: transparent; border: none; color: white; width: 100%; font-family: monospace; font-size: 16px; outline: none; margin-left: 10px; }
    </style>
</head>
<body>
    <div id='preloader'><div class='spin-logo'></div></div>

    <div class='content'>
        <div class='navbar'>
            <div class='logo-box'><div class='nav-logo'></div> NEURA STUDIO</div>
            <div style='font-weight:600; color:#5E5E73;'>Overview | Nova Hub | Downloads</div>
        </div>
        
        <div class='hero'>
            <div class='lang-logo'></div>
            <h1>Nova Script.</h1>
            <p>The Omni-Domain Architecture. Master AI, OS, Web, and Robotics natively.</p>
        </div>

        <div class='terminal'>
            <div class='term-header'><div class='dot'></div><div class='dot' style='background:#FFBD2E'></div><div class='dot' style='background:#27C93F'></div></div>
            <div class='term-body' id="t-body">
                <span style='color:#00A2FF'>Nova VM v1.0.0 (Relational & Boolean Core Active)</span><br>
                > Nova.show("Engine Booted with New Neura Logos.")<br>
                Engine Booted with New Neura Logos.<br>
            </div>
            <div class='term-input'>
                <span style="color:#00A2FF">></span>
                <input type="text" id="t-in" onkeypress="handleCmd(event)" autofocus>
            </div>
        </div>
    </div>
    
    <script>
        function handleCmd(e) {
            if(e.key === 'Enter') {
                let val = document.getElementById('t-in').value;
                let out = document.getElementById('t-body');
                out.innerHTML += `> ${val}<br>`;
                
                // Simulating true/false and relational ops
                if(val.includes('>') || val.includes('<') || val.includes('==')) {
                    out.innerHTML += `<span style="color:#00FF88">true</span><br>`;
                } else if(val.startsWith('Nova.show')) {
                    out.innerHTML += `<span style="color:white">${val.match(/"(.*?)"/)[1]}</span><br>`;
                } else {
                    out.innerHTML += `<span style="color:#FF5F56">[Syntax Error] Unknown entity.</span><br>`;
                }
                document.getElementById('t-in').value = '';
            }
        }
    </script>
</body>
</html>
